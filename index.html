<!doctype html>
<html>
  <head>
    <title>JavaScript Sandbox</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        position: fixed;
        overflow: hidden;
        overscroll-behavior: none;
        background-color: black;
        color: white;
      }

      #stage {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #info {
        position: fixed;
        bottom: 0;
        left: 0;
        padding: 10px 12px;
        font-family: monospace;
        font-size: 12px;
        color: #fff;
        background: rgba(0, 0, 0, 0.35);
        pointer-events: none;
      }

      #info a {
        pointer-events: auto;
        color: #8fd3ff;
        text-decoration: underline;
      }

      #stats {
        bottom: 0 !important;
        top: auto;

        >* {
          bottom: 0 !important;
          top: auto !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="stage"></div>
    <div id="info">Minimal TSL fluid - drag to inject smoke. <a href="https://github.com/LiorArbel/minimal-fluid">Source code</a><br>2026 Lior Arbel</div>

    <script>
      const isLocalHost =
        location.hostname === "localhost" || location.hostname === "127.0.0.1";

      const threeBase = isLocalHost
        ? "../node_modules/three"
        : "https://cdn.jsdelivr.net/npm/three@0.180.0";
      const statsBase = isLocalHost
        ? "../node_modules/stats-gl"
        : "https://cdn.jsdelivr.net/npm/stats-gl@4.1.0";
      const guiBase = isLocalHost
        ? "../node_modules/lil-gui"
        : "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0";

      const importMap = document.createElement("script");
      importMap.type = "importmap";
      importMap.textContent = JSON.stringify({
        imports: {
          three: `${threeBase}/build/three.module.js`,
          "three/addons/": `${threeBase}/examples/jsm/`,
          "three/tsl": `${threeBase}/build/three.tsl.js`,
          "three/webgpu": `${threeBase}/build/three.webgpu.js`,
          "stats-gl": `${statsBase}/dist/main.js`,
          "lil-gui": `${guiBase}/dist/lil-gui.esm.js`,
        },
      });
      document.currentScript.after(importMap);
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
